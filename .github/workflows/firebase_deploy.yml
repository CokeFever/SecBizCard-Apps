name: Deploy Firebase (Hosting & Functions)

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - 'functions/**'
      - 'firebase.json'
      - 'firestore.rules'
  workflow_dispatch:

jobs:
  build_and_deploy:
    name: Build & Deploy Firebase Target
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20 (for Website)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Nuxt Website
        working-directory: ./website
        run: |
          npm ci
          npm run generate

      - name: Setup Node.js 22 (for Functions)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Functions
        working-directory: ./functions
        run: |
          npm ci
          npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting & Functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          # Write the secret JSON to a temporary file
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/google-credentials.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/google-credentials.json
          
          # Deploy using the service account permissions
          firebase deploy --only hosting,functions --project ixo-app-secbizcard
